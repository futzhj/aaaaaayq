name: Build Android Native Libraries

on:
  push:
    branches: [ main, master ]
    paths:
      - 'deps/**'
      - '.github/workflows/build_android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'deps/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SOLUTION_FILE: deps/Projects/android-vs/Android.sln

jobs:
  build-android:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.configuration)) || fromJSON('["Release"]') }}
        platform: [ARM, ARM64, x86, x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install VS Android C++ workload
      shell: pwsh
      run: |
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vsWhere -latest -property installationPath
        Write-Host "VS Path: $vsPath"

        # 安装 VS Android 移动开发工作负载
        & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
          --installPath "$vsPath" `
          --add Microsoft.VisualStudio.Workload.NativeMobile `
          --add Component.MDD.Android `
          --quiet --norestart --wait

        Write-Host "Android C++ 移动开发工作负载已安装"

    - name: Diagnose NDK environment
      shell: pwsh
      run: |
        # 列出所有可用的 NDK 版本
        Write-Host "=== NDK 环境诊断 ==="
        $ndkPaths = @(
          "$env:ANDROID_NDK_HOME",
          "$env:ANDROID_NDK_ROOT",
          "C:\Microsoft\AndroidNDK\android-ndk-r23c",
          "C:\Microsoft\AndroidNDK64\android-ndk-r23c",
          "C:\Program Files (x86)\Android\AndroidNDK\android-ndk-r23c"
        )
        foreach ($p in $ndkPaths) {
          if ($p -and (Test-Path $p)) {
            Write-Host "  Found NDK: $p"
            if (Test-Path "$p\source.properties") {
              Get-Content "$p\source.properties" | Select-Object -First 3
            }
          }
        }
        # 搜索所有 NDK 安装
        Get-ChildItem "C:\Program Files (x86)\Android\AndroidNDK" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  NDK dir: $($_.FullName)" }
        Get-ChildItem "C:\Microsoft\AndroidNDK*" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  NDK dir: $($_.FullName)" }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Verify prebuilt libraries
      shell: pwsh
      run: |
        # ggelua.so 链接 libcrypto.a, ghpsocket.so 链接 libbrotli.a + libcrypto.a
        # 这些预编译的 .a 文件已提交到仓库中
        $platform = '${{ matrix.platform }}'

        # 检查 openssl libcrypto.a (ggelua 依赖)
        $opensslLib = "deps/Dependencies/openssl/android/$platform/lib/libcrypto.a"
        if (Test-Path $opensslLib) {
          $size = [math]::Round((Get-Item $opensslLib).Length/1KB, 1)
          Write-Host "✅ OpenSSL libcrypto.a ($platform): $size KB"
        } else {
          Write-Warning "❌ Missing: $opensslLib"
        }

        # 检查 HP-Socket 预编译库 (ghpsocket 依赖)
        $abiMap = @{ 'ARM'='armeabi-v7a'; 'ARM64'='arm64-v8a'; 'x86'='x86'; 'x64'='x86_64' }
        $abi = $abiMap[$platform]
        $hpDir = "deps/Dependencies/HP-Socket/Linux/dependent/android-ndk/$abi/lib"
        if (Test-Path $hpDir) {
          Get-ChildItem $hpDir -Filter "*.a" | ForEach-Object {
            Write-Host "✅ HP-Socket $($_.Name) ($abi): $([math]::Round($_.Length/1KB, 1)) KB"
          }
        } else {
          Write-Warning "❌ Missing: $hpDir"
        }

    - name: Build ${{ matrix.platform }} (${{ matrix.configuration }})
      shell: pwsh
      run: |
        # C++ 标准已通过 Directory.Build.targets 统一设置为 c++14
        # 安全加固标志已通过 lua.props 统一传递
        msbuild ${{ env.SOLUTION_FILE }} `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:PostBuildEventUseInBuild=false `
          /m /v:minimal

    - name: Collect .so artifacts (jniLibs 结构)
      shell: pwsh
      run: |
        # VS Android 输出: $(SolutionDir).$(Platform)\$(Configuration)\
        $buildDir = "deps/Projects/android-vs/.${{ matrix.platform }}/${{ matrix.configuration }}"

        # 映射 VS Platform -> APK ABI 目录名
        $abiMap = @{
          'ARM64' = 'arm64-v8a'
          'ARM'   = 'armeabi-v7a'
          'x64'   = 'x86_64'
          'x86'   = 'x86'
        }
        $abi = $abiMap['${{ matrix.platform }}']
        # 输出结构: jniLibs/{abi}/*.so — 与预编译模版目录一致
        $outDir = "jniLibs/$abi"
        New-Item -ItemType Directory -Path $outDir -Force | Out-Null

        if (Test-Path $buildDir) {
          Get-ChildItem -Path $buildDir -Filter "*.so" -Recurse | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1)) KB)"
            Copy-Item $_.FullName -Destination $outDir -Force
          }
        } else {
          Write-Warning "Build output directory not found: $buildDir"
          Get-ChildItem -Path "deps/Projects/android-vs" -Filter ".*" -Directory | ForEach-Object {
            Write-Host "Found dir: $($_.Name)"
          }
        }

        Write-Host "`n=== $abi SO 文件清单 ==="
        Get-ChildItem $outDir -Filter "*.so" | ForEach-Object {
          Write-Host "  $($_.Name)  $([math]::Round($_.Length/1KB, 1)) KB"
        }

    - name: Upload per-ABI artifact
      uses: actions/upload-artifact@v4
      with:
        name: jniLibs-${{ matrix.platform }}-${{ matrix.configuration }}
        path: jniLibs/
        if-no-files-found: warn
        retention-days: 30

  # ===== 合并全 ABI 为一键替换包 =====
  merge-jniLibs:
    runs-on: ubuntu-latest
    needs: build-android
    if: success()
    steps:
    - name: Download all ABI artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: jniLibs-*
        path: merged/
        merge-multiple: true

    - name: Verify merged jniLibs structure
      shell: bash
      run: |
        echo "=== 合并后的 jniLibs 目录结构 ==="
        find merged/ -name "*.so" | sort
        echo ""
        echo "=== 各 ABI SO 文件数量 ==="
        for abi in arm64-v8a armeabi-v7a x86 x86_64; do
          count=$(find merged/ -path "*/$abi/*.so" 2>/dev/null | wc -l)
          echo "  $abi: $count 个 .so 文件"
        done

    - name: Upload merged jniLibs (一键替换包)
      uses: actions/upload-artifact@v4
      with:
        name: jniLibs-all-abis
        path: merged/
        if-no-files-found: error
        retention-days: 30
