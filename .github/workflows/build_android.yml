name: Build Android Native Libraries

on:
  push:
    branches: [ main, master ]
    paths:
      - 'deps/**'
      - '.github/workflows/build_android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'deps/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  ANDROID_PROJECT_DIR: deps/Projects/android
  BUILD_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.configuration || 'Release' }}
  OPENSSL_VER: "3.6.1"

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup NDK r26d
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26d
        add-to-path: false

    # ── OpenSSL 交叉编译 (per ABI, 带缓存) ──
    - name: Cache OpenSSL (${{ matrix.abi }})
      uses: actions/cache@v4
      id: openssl-cache
      with:
        path: openssl-android-${{ matrix.abi }}
        key: openssl-${{ env.OPENSSL_VER }}-android-${{ matrix.abi }}-v1

    - name: Build OpenSSL ${{ env.OPENSSL_VER }} for Android (${{ matrix.abi }})
      if: steps.openssl-cache.outputs.cache-hit != 'true'
      run: |
        INSTALL_DIR="${{ github.workspace }}/openssl-android-${{ matrix.abi }}"
        OPENSSL_DIR="${{ github.workspace }}/openssl-src"
        NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
        ABI="${{ matrix.abi }}"

        curl -sL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VER}/openssl-${OPENSSL_VER}.tar.gz" \
          -o /tmp/openssl.tar.gz
        mkdir -p "${OPENSSL_DIR}"
        tar xzf /tmp/openssl.tar.gz -C "${OPENSSL_DIR}" --strip-components=1

        case "${ABI}" in
          arm64-v8a)   TARGET="android-arm64"  ;;
          armeabi-v7a) TARGET="android-arm"    ;;
          x86_64)      TARGET="android-x86_64" ;;
          x86)         TARGET="android-x86"    ;;
        esac

        export ANDROID_NDK_ROOT="${NDK}"
        export PATH="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"

        cd "${OPENSSL_DIR}"
        ./Configure ${TARGET} -D__ANDROID_API__=24 \
          no-shared no-tests no-apps no-docs \
          no-ssl3 no-comp no-engine no-deprecated \
          no-sm3 no-sm4 \
          --prefix="${INSTALL_DIR}" \
          --openssldir="${INSTALL_DIR}/ssl"

        make -j$(nproc) build_libs
        make install_dev DESTDIR=""

        echo "=== OpenSSL ${OPENSSL_VER} for ${ABI} ==="
        ls -la "${INSTALL_DIR}/lib/libcrypto.a" 2>/dev/null || \
        ls -la "${INSTALL_DIR}/lib64/libcrypto.a" 2>/dev/null || \
        echo "⚠️ libcrypto.a 路径需要检查"

    # ── CMake 配置 ──
    - name: Configure CMake (${{ matrix.abi }})
      run: |
        OPENSSL_INSTALL="${{ github.workspace }}/openssl-android-${{ matrix.abi }}"

        if [ -f "${OPENSSL_INSTALL}/lib/libcrypto.a" ]; then
          CRYPTO_LIB="${OPENSSL_INSTALL}/lib/libcrypto.a"
        elif [ -f "${OPENSSL_INSTALL}/lib64/libcrypto.a" ]; then
          CRYPTO_LIB="${OPENSSL_INSTALL}/lib64/libcrypto.a"
        else
          echo "::error::libcrypto.a not found in ${OPENSSL_INSTALL}"
          exit 1
        fi
        echo "Using libcrypto.a: ${CRYPTO_LIB}"

        # 预编译 SDL .so 路径 (用于正确生成 DT_NEEDED 依赖)
        SDL_PREBUILT="${{ github.workspace }}/${{ env.ANDROID_PROJECT_DIR }}/../../Projects/android-vs/app/GGELUA/app/src/main/jniLibs/${{ matrix.abi }}"

        cmake -B build-android \
          -S ${{ env.ANDROID_PROJECT_DIR }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_CONFIG }} \
          -DOPENSSL_CRYPTO_LIB="${CRYPTO_LIB}" \
          -DPREBUILT_SDL_DIR="${SDL_PREBUILT}" \
          -DCMAKE_INSTALL_PREFIX=install-android \
          -G Ninja

    - name: Build ${{ matrix.abi }} (${{ env.BUILD_CONFIG }})
      run: cmake --build build-android -j$(nproc)

    - name: Install & validate
      run: |
        cmake --install build-android --config ${{ env.BUILD_CONFIG }}

        echo "=== 产物列表 (${{ matrix.abi }}) ==="
        ls -la install-android/${{ matrix.abi }}/

        GGELUA_SO="install-android/${{ matrix.abi }}/libggelua.so"
        if [ ! -f "$GGELUA_SO" ]; then
          echo "::error::FATAL: libggelua.so 未生成!"
          exit 1
        fi
        echo "✅ libggelua.so 已生成"

    - name: Upload per-ABI .so
      uses: actions/upload-artifact@v4
      with:
        name: android-${{ matrix.abi }}
        path: install-android/
        retention-days: 1

  # ====================================================================
  # 合并所有 ABI .so 为一个压缩包
  # ====================================================================
  package:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
    - name: Download all ABI artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: android-*
        path: jniLibs-all-abis/
        merge-multiple: true

    - name: Validate & assemble android-libs.zip
      run: |
        echo "=== 产物目录结构 ==="
        find jniLibs-all-abis/ -type f | sort

        echo ""
        REQUIRED_SO=(liblua54.so libggelua.so libgsdl2.so libmygxy.so libgastar.so liblsqlite3.so libmain.so)
        ABIS=(arm64-v8a armeabi-v7a x86_64 x86)
        MISSING=()

        for abi in "${ABIS[@]}"; do
          for so in "${REQUIRED_SO[@]}"; do
            path="jniLibs-all-abis/${abi}/${so}"
            if [ -f "$path" ]; then
              SIZE=$(stat -c%s "$path")
              SIZE_KB=$((SIZE / 1024))
              echo "  ✅ ${abi}/${so} (${SIZE_KB} KB)"
            else
              echo "  ❌ ${abi}/${so} MISSING"
              MISSING+=("${abi}/${so}")
            fi
          done
        done

        echo ""
        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "::error::缺失 ${#MISSING[@]} 个 .so: ${MISSING[*]}"
          exit 1
        fi

        echo "=== 打包 android-libs.zip ==="
        cd jniLibs-all-abis
        zip -r "${{ github.workspace }}/android-libs.zip" .
        cd "${{ github.workspace }}"
        ls -la android-libs.zip

    - name: Upload android-libs.zip
      uses: actions/upload-artifact@v4
      with:
        name: android-libs
        path: android-libs.zip
        if-no-files-found: error
        retention-days: 30

    - name: Cleanup per-ABI artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: |
          android-arm64-v8a
          android-armeabi-v7a
          android-x86_64
          android-x86
