name: Build Android APK Template

on:
  push:
    branches: [ main, master, trae, 实验室 ]
    paths:
      - 'deps/**'
      - '.github/workflows/build_android.yml'
  pull_request:
    branches: [ main, master, trae, 实验室 ]
    paths:
      - 'deps/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  ANDROID_PROJECT_DIR: deps/Projects/android
  GRADLE_PROJECT_DIR: deps/Projects/android-vs/app/GGELUA
  BUILD_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.configuration || 'Release' }}
  OPENSSL_VER: "3.6.1"

jobs:
  # ====================================================================
  # Stage 1: 编译引擎 SO (每 ABI 独立编译)
  # ====================================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup NDK r26d
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26d
        add-to-path: false

    # ── OpenSSL 交叉编译 (per ABI, 带缓存) ──
    - name: Cache OpenSSL (${{ matrix.abi }})
      uses: actions/cache@v4
      id: openssl-cache
      with:
        path: openssl-android-${{ matrix.abi }}
        key: openssl-${{ env.OPENSSL_VER }}-android-${{ matrix.abi }}-v1

    - name: Build OpenSSL ${{ env.OPENSSL_VER }} for Android (${{ matrix.abi }})
      if: steps.openssl-cache.outputs.cache-hit != 'true'
      run: |
        INSTALL_DIR="${{ github.workspace }}/openssl-android-${{ matrix.abi }}"
        OPENSSL_DIR="${{ github.workspace }}/openssl-src"
        NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
        ABI="${{ matrix.abi }}"

        curl -sL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VER}/openssl-${OPENSSL_VER}.tar.gz" \
          -o /tmp/openssl.tar.gz
        mkdir -p "${OPENSSL_DIR}"
        tar xzf /tmp/openssl.tar.gz -C "${OPENSSL_DIR}" --strip-components=1

        case "${ABI}" in
          arm64-v8a)   TARGET="android-arm64"  ;;
          armeabi-v7a) TARGET="android-arm"    ;;
          x86_64)      TARGET="android-x86_64" ;;
          x86)         TARGET="android-x86"    ;;
        esac

        export ANDROID_NDK_ROOT="${NDK}"
        export PATH="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"

        cd "${OPENSSL_DIR}"
        ./Configure ${TARGET} -D__ANDROID_API__=24 \
          no-shared no-tests no-apps no-docs \
          no-ssl3 no-comp no-engine no-deprecated \
          no-sm3 no-sm4 \
          --prefix="${INSTALL_DIR}" \
          --openssldir="${INSTALL_DIR}/ssl"

        make -j$(nproc) build_libs
        make install_dev DESTDIR=""

        echo "=== OpenSSL ${OPENSSL_VER} for ${ABI} ==="
        ls -la "${INSTALL_DIR}/lib/libcrypto.a" 2>/dev/null || \
        ls -la "${INSTALL_DIR}/lib64/libcrypto.a" 2>/dev/null || \
        echo "⚠️ libcrypto.a 路径需要检查"

    # ── CMake 配置 ──
    - name: Configure CMake (${{ matrix.abi }})
      run: |
        OPENSSL_INSTALL="${{ github.workspace }}/openssl-android-${{ matrix.abi }}"

        if [ -f "${OPENSSL_INSTALL}/lib/libcrypto.a" ]; then
          CRYPTO_LIB="${OPENSSL_INSTALL}/lib/libcrypto.a"
          SSL_LIB="${OPENSSL_INSTALL}/lib/libssl.a"
        elif [ -f "${OPENSSL_INSTALL}/lib64/libcrypto.a" ]; then
          CRYPTO_LIB="${OPENSSL_INSTALL}/lib64/libcrypto.a"
          SSL_LIB="${OPENSSL_INSTALL}/lib64/libssl.a"
        else
          echo "::error::libcrypto.a not found in ${OPENSSL_INSTALL}"
          exit 1
        fi
        echo "Using libcrypto.a: ${CRYPTO_LIB}"
        echo "Using libssl.a: ${SSL_LIB}"

        # 预编译 SDL .so 路径 (用于正确生成 DT_NEEDED 依赖)
        SDL_PREBUILT="${{ github.workspace }}/${{ env.GRADLE_PROJECT_DIR }}/app/src/main/jniLibs/${{ matrix.abi }}"

        cmake -B build-android \
          -S ${{ env.ANDROID_PROJECT_DIR }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_CONFIG }} \
          -DOPENSSL_CRYPTO_LIB="${CRYPTO_LIB}" \
          -DOPENSSL_SSL_LIB="${SSL_LIB}" \
          -DPREBUILT_SDL_DIR="${SDL_PREBUILT}" \
          -DCMAKE_INSTALL_PREFIX=install-android \
          -G Ninja

    - name: Build ${{ matrix.abi }} (${{ env.BUILD_CONFIG }})
      run: cmake --build build-android -j$(nproc)

    - name: Install & validate
      run: |
        cmake --install build-android --config ${{ env.BUILD_CONFIG }}

        echo "=== 产物列表 (${{ matrix.abi }}) ==="
        ls -la install-android/${{ matrix.abi }}/

        GGELUA_SO="install-android/${{ matrix.abi }}/libggelua.so"
        if [ ! -f "$GGELUA_SO" ]; then
          echo "::error::FATAL: libggelua.so 未生成!"
          exit 1
        fi
        echo "✅ libggelua.so 已生成"

    - name: Upload per-ABI .so
      uses: actions/upload-artifact@v4
      with:
        name: android-${{ matrix.abi }}
        path: install-android/
        retention-days: 1

  # ====================================================================
  # Stage 2: 合并 SO + Gradle 打包 APK
  # ====================================================================
  package-apk:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # ── JDK 17 (AGP 8.x 要求) ──
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ── 下载所有 ABI 的编译产物 ──
    - name: Download all ABI artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: android-*
        path: compiled-libs/
        merge-multiple: true

    # ── 合并 SO 到 jniLibs (与已有 SDL SO 合并) ──
    - name: Merge compiled SO into jniLibs
      run: |
        JNILIBS="${{ env.GRADLE_PROJECT_DIR }}/app/src/main/jniLibs"
        ABIS=(arm64-v8a armeabi-v7a x86_64 x86)
        ENGINE_SO=(liblua54.so libggelua.so libgsdl2.so libmygxy.so libgastar.so liblsqlite3.so libmain.so)

        echo "=== 合并引擎 SO 到 jniLibs ==="
        # 预编译 SDL .so 白名单 (仅这4个来自 git, 其余必须全部由 CI 新编译)
        SDL_KEEP=(libSDL2.so libSDL_image.so libSDL_mixer.so libSDL_ttf.so)

        for abi in "${ABIS[@]}"; do
          echo ""
          echo "--- ${abi} ---"

          # 确保目录存在
          mkdir -p "${JNILIBS}/${abi}"

          # 安全网: 清除所有非 SDL 的 .so 和 .a, 确保不打包旧库
          for f in "${JNILIBS}/${abi}"/*.so "${JNILIBS}/${abi}"/*.a; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            is_sdl=false
            for keep in "${SDL_KEEP[@]}"; do
              [ "$fname" = "$keep" ] && is_sdl=true && break
            done
            if [ "$is_sdl" = false ]; then
              echo "  清除旧文件: $fname"
              rm -f "$f"
            fi
          done

          # 复制 CMake 编译产物
          if [ -d "compiled-libs/${abi}" ]; then
            cp -v compiled-libs/${abi}/*.so "${JNILIBS}/${abi}/"
          else
            echo "::error::编译产物目录不存在: compiled-libs/${abi}"
            exit 1
          fi

          # 移除旧的 libcjson.so (已内嵌到 libggelua.so)
          if [ -f "${JNILIBS}/${abi}/libcjson.so" ]; then
            echo "  移除旧 libcjson.so (已内嵌)"
            rm -f "${JNILIBS}/${abi}/libcjson.so"
          fi

          # 校验必要 SO
          echo "  已有 SO:"
          ls -la "${JNILIBS}/${abi}/"*.so 2>/dev/null | awk '{print "    " $NF " (" $5 " bytes)"}'

          # 检查 SDL 预编译 SO 是否存在
          for sdl_so in libSDL2.so libSDL_image.so libSDL_mixer.so libSDL_ttf.so; do
            if [ ! -f "${JNILIBS}/${abi}/${sdl_so}" ]; then
              echo "::error::${abi} 缺失预编译 ${sdl_so}"
              exit 1
            fi
          done

          # 检查引擎 SO
          for eng_so in "${ENGINE_SO[@]}"; do
            if [ ! -f "${JNILIBS}/${abi}/${eng_so}" ]; then
              echo "::error::${abi} 缺失引擎 ${eng_so}"
              exit 1
            fi
          done

          echo "  ✅ ${abi}: $(ls ${JNILIBS}/${abi}/*.so | wc -l) 个 SO 就绪"
        done

    # ── Gradle 打包 Release APK ──
    - name: Build APK with Gradle
      working-directory: ${{ env.GRADLE_PROJECT_DIR }}
      run: |
        # gradle-wrapper.jar 没有 Main-Class manifest, 需用 -cp 指定主类
        java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleRelease --no-daemon --info
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    # ── 验证 APK ──
    - name: Validate APK
      run: |
        APK_PATH="${{ env.GRADLE_PROJECT_DIR }}/app/build/outputs/apk/release/app-release.apk"
        if [ ! -f "${APK_PATH}" ]; then
          echo "::error::APK 未生成！"
          # 列出 build 目录帮助调试
          find "${{ env.GRADLE_PROJECT_DIR }}/app/build/outputs" -name "*.apk" 2>/dev/null || true
          exit 1
        fi

        APK_SIZE=$(stat -c%s "${APK_PATH}")
        APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
        echo "✅ APK 已生成: ${APK_PATH} (${APK_SIZE_MB} MB)"

        # 用 unzip 检查 lib/ 下的 SO
        echo ""
        echo "=== APK 内 lib/ 目录 ==="
        unzip -l "${APK_PATH}" "lib/*" | grep "\.so$" | awk '{print "  " $NF " (" $1 " bytes)"}'

        # 检查每个 ABI 的 SO 数量
        EXPECTED_SO=11  # 7 引擎 + 4 SDL (去除 cjson)
        for abi in arm64-v8a armeabi-v7a x86_64 x86; do
          COUNT=$(unzip -l "${APK_PATH}" "lib/${abi}/*.so" 2>/dev/null | grep "\.so$" | wc -l)
          if [ "$COUNT" -lt "$EXPECTED_SO" ]; then
            echo "::warning::${abi} 只有 ${COUNT}/${EXPECTED_SO} 个 SO"
          else
            echo "✅ ${abi}: ${COUNT} 个 SO"
          fi
        done

    # ── 重命名并上传 ──
    - name: Upload GGELUA.apk
      uses: actions/upload-artifact@v4
      with:
        name: GGELUA-apk
        path: ${{ env.GRADLE_PROJECT_DIR }}/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
        retention-days: 30

    # ── 清理临时 artifact ──
    - name: Cleanup per-ABI artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: |
          android-arm64-v8a
          android-armeabi-v7a
          android-x86_64
          android-x86
