name: Build Windows DLLs

on:
  push:
    branches: [ main, master, trae, 实验室 ]
    paths:
      - 'deps/**'
      - '.github/workflows/build_windows.yml'
  pull_request:
    branches: [ main, master, trae, 实验室 ]
    paths:
      - 'deps/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SOLUTION_FILE: deps/Projects/windows/Windows.sln
  OPENSSL_VER: "3.6.1"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.configuration)) || fromJSON('["Release"]') }}
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Junctions (Dependencies + Sources)
      shell: pwsh
      run: |
        # CI checkout 不保留 junction，需要重新创建
        # cmd /c mklink 必须使用反斜杠路径
        foreach ($name in @("Dependencies", "Sources")) {
          $winPath = "deps\Projects\windows\$name"
          if (Test-Path $winPath) {
            $item = Get-Item $winPath -Force
            if ($item.LinkType -ne 'Junction') {
              Remove-Item $winPath -Recurse -Force
              cmd /c mklink /J "$winPath" "..\..\$name"
              Write-Host "✅ $name Junction 已重建"
            } else {
              Write-Host "✅ $name Junction 已存在"
            }
          } else {
            cmd /c mklink /J "$winPath" "..\..\$name"
            Write-Host "✅ $name Junction 已创建"
          }
        }
        # 验证
        Test-Path "deps\Projects\windows\Dependencies\libhv\hconfig.h"
        Test-Path "deps\Projects\windows\Sources\lib\ggelua\main.c"

    # ── OpenSSL 静态编译 (去除 DLL 依赖) ──
    - name: Setup NASM
      uses: ilammy/setup-nasm@v1

    - name: Cache OpenSSL (x64 static)
      uses: actions/cache@v4
      id: openssl-cache
      with:
        path: openssl-win-x64
        key: openssl-${{ env.OPENSSL_VER }}-win-x64-static-mt-v1

    - name: Build OpenSSL ${{ env.OPENSSL_VER }} (static /MT)
      if: steps.openssl-cache.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        curl -sL "https://github.com/openssl/openssl/releases/download/openssl-%OPENSSL_VER%/openssl-%OPENSSL_VER%.tar.gz" -o openssl.tar.gz
        tar xzf openssl.tar.gz
        cd openssl-%OPENSSL_VER%
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
        perl Configure VC-WIN64A no-shared no-tests no-apps no-docs ^
          no-ssl3 no-comp no-engine no-deprecated ^
          --prefix=%cd%\..\openssl-win-x64 ^
          --openssldir=%cd%\..\openssl-win-x64\ssl
        nmake build_libs
        nmake install_dev DESTDIR=""
        echo === OpenSSL %OPENSSL_VER% static x64 ===
        dir /b ..\openssl-win-x64\lib\*.lib

    - name: Replace OpenSSL libs (dynamic → static)
      shell: pwsh
      run: |
        $depsLib = "deps/Dependencies/openssl/lib"
        $staticLib = "openssl-win-x64/lib"

        # 备份旧导入库
        foreach ($name in @("libcrypto.lib", "libssl.lib")) {
          $old = "$depsLib/$name"
          if (Test-Path $old) {
            $oldSize = (Get-Item $old).Length
            Write-Host "  旧 $name : $([math]::Round($oldSize/1KB,1)) KB (导入库)"
          }
        }

        # 复制静态库
        Copy-Item "$staticLib/libcrypto.lib" -Destination $depsLib -Force
        Copy-Item "$staticLib/libssl.lib"    -Destination $depsLib -Force

        foreach ($name in @("libcrypto.lib", "libssl.lib")) {
          $f = Get-Item "$depsLib/$name"
          $sizeKB = [math]::Round($f.Length/1KB, 1)
          Write-Host "  ✅ $name : $sizeKB KB (静态库)"
        }

        # 复制头文件 (确保版本一致)
        $depsInc = "deps/Dependencies/openssl/include"
        if (Test-Path "openssl-win-x64/include/openssl") {
          Copy-Item "openssl-win-x64/include/openssl/*" -Destination "$depsInc/openssl/" -Force -Recurse
          Write-Host "  ✅ OpenSSL 头文件已更新"
        }

    - name: Build ${{ matrix.platform }} (${{ matrix.configuration }})
      shell: pwsh
      run: |
        # 所有 vcxproj 已统一为 v143 (VS 2022)
        # 此处仍保留全局覆盖作为防御性措施，防止意外引入其他工具集版本
        # PostBuildEvent 禁用: 仅用于本地开发的 copy 操作，CI 上目标不存在
        msbuild ${{ env.SOLUTION_FILE }} `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:PlatformToolset=v143 `
          /p:PostBuildEventUseInBuild=false `
          /m /v:minimal

    - name: Validate build output
      shell: pwsh
      run: |
        $buildRoot = "deps/Projects/windows"
        # ── 实际输出的 DLL/EXE 产物清单 ──
        # lua54/SDL2/SDL_image/SDL_mixer/SDL_ttf/zlib/ghv/libhv/physfs 均为 StaticLibrary
        # 已全部静态链入 ggelua.dll，不会产生独立 DLL
        $required = @(
          "ggelua.dll",      # 引擎核心 (静态含 lua54/SDL2/SDL_image/SDL_mixer/SDL_ttf/zlib/ghv/libhv/physfs)
          "gsdl2.dll",       # SDL Lua 绑定
          "mygxy.dll",       # 资源格式 (WPK/WDF/FSB + zstd/lz4)
          "hiredis.dll",     # Redis 客户端
          "lsqlite3.dll",    # SQLite Lua 绑定
          "gastar.dll",      # A* 寻路
          "GGELUA.exe",      # 主程序 (窗口)
          "GGELUAc.exe",     # 主程序 (控制台)
          "lua.exe"          # Lua 解释器
        )

        # 搜索 .x64 编译输出目录
        $found = @{}
        Get-ChildItem -Path $buildRoot -Directory -Filter ".x64" -Recurse -ErrorAction SilentlyContinue |
          ForEach-Object {
            Get-ChildItem -Path $_.FullName -Include "*.dll","*.exe" -Recurse -ErrorAction SilentlyContinue
          } |
          ForEach-Object { $found[$_.Name] = $_ }

        $missing = @()
        foreach ($name in $required) {
          if ($found.ContainsKey($name)) {
            $f = $found[$name]
            $sizeKB = [math]::Round($f.Length / 1KB, 1)
            Write-Host "  ✅ $name ($sizeKB KB)"
          } else {
            Write-Host "  ❌ $name MISSING"
            $missing += $name
          }
        }

        # 列出其他意外产物 (不阻塞，仅供参考)
        $extra = $found.Keys | Where-Object { $_ -notin $required }
        if ($extra.Count -gt 0) {
          Write-Host ""
          Write-Host "⚠️ 意外产物 (未在必须清单中):"
          $extra | ForEach-Object { Write-Host "  ⚠️ $_" }
        }

        Write-Host ""
        Write-Host "总计: $($found.Count) 个产物, $($missing.Count) 个缺失"
        if ($missing.Count -gt 0) {
          Write-Error "Build validation failed: missing $($missing -join ', ')"
          exit 1
        }

    - name: Collect artifacts
      shell: pwsh
      run: |
        $outDir = "artifacts"
        New-Item -ItemType Directory -Path $outDir -Force | Out-Null

        # 精确收集指定的 DLL/EXE，不收集静态库和中间产物
        $targets = @(
          "ggelua.dll",
          "gsdl2.dll",
          "mygxy.dll",
          "hiredis.dll",
          "lsqlite3.dll",
          "gastar.dll",
          "GGELUA.exe",
          "GGELUAc.exe",
          "lua.exe"
        )

        $buildRoot = "deps/Projects/windows"
        $allFiles = @{}
        Get-ChildItem -Path $buildRoot -Directory -Filter ".x64" -Recurse -ErrorAction SilentlyContinue |
          ForEach-Object {
            Get-ChildItem -Path $_.FullName -Include "*.dll","*.exe" -Recurse -ErrorAction SilentlyContinue
          } |
          ForEach-Object { $allFiles[$_.Name] = $_ }

        $collected = 0
        foreach ($name in $targets) {
          if ($allFiles.ContainsKey($name)) {
            $f = $allFiles[$name]
            $sizeKB = [math]::Round($f.Length / 1KB, 1)
            Write-Host "  📦 $name ($sizeKB KB)"
            Copy-Item $f.FullName -Destination $outDir -Force
            $collected++
          }
        }
        Write-Host ""
        Write-Host "已收集 $collected / $($targets.Count) 个产物"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-dlls-${{ matrix.platform }}-${{ matrix.configuration }}
        path: artifacts/
        if-no-files-found: error
        retention-days: 30
