name: Build Windows DLLs

on:
  push:
    branches: [ main, master ]
    paths:
      - 'deps/**'
      - '.github/workflows/build_windows.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'deps/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SOLUTION_FILE: deps/Projects/windows/Windows.sln

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.configuration)) || fromJSON('["Release"]') }}
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Junctions (Dependencies + Sources)
      shell: pwsh
      run: |
        # CI checkout 不保留 junction，需要重新创建
        # cmd /c mklink 必须使用反斜杠路径
        foreach ($name in @("Dependencies", "Sources")) {
          $winPath = "deps\Projects\windows\$name"
          if (Test-Path $winPath) {
            $item = Get-Item $winPath -Force
            if ($item.LinkType -ne 'Junction') {
              Remove-Item $winPath -Recurse -Force
              cmd /c mklink /J "$winPath" "..\..\$name"
              Write-Host "✅ $name Junction 已重建"
            } else {
              Write-Host "✅ $name Junction 已存在"
            }
          } else {
            cmd /c mklink /J "$winPath" "..\..\$name"
            Write-Host "✅ $name Junction 已创建"
          }
        }
        # 验证
        Test-Path "deps\Projects\windows\Dependencies\libhv\hconfig.h"
        Test-Path "deps\Projects\windows\Sources\lib\ggelua\main.c"

    - name: Build ${{ matrix.platform }} (${{ matrix.configuration }})
      shell: pwsh
      run: |
        # 所有 vcxproj 已统一为 v143 (VS 2022)
        # 此处仍保留全局覆盖作为防御性措施，防止意外引入其他工具集版本
        # PostBuildEvent 禁用: 仅用于本地开发的 copy 操作，CI 上目标不存在
        msbuild ${{ env.SOLUTION_FILE }} `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:PlatformToolset=v143 `
          /p:PostBuildEventUseInBuild=false `
          /m /v:minimal

    - name: Validate build output
      shell: pwsh
      run: |
        $buildRoot = "deps/Projects/windows"
        # 必须存在的关键 DLL/EXE (从各子项目 .x64 输出目录搜索)
        $required = @(
          "ggelua.dll",      # 引擎核心
          "lua54.dll",       # Lua 运行时
          "SDL2.dll",        # 渲染/事件
          "SDL_image.dll",   # 图片加载
          "SDL_mixer.dll",   # 混音器
          "SDL_ttf.dll",     # 字体渲染
          "GGELUA.exe"       # 主程序
        )

        $found = @{}
        Get-ChildItem -Path $buildRoot -Directory -Filter ".x64" -Recurse -ErrorAction SilentlyContinue |
          ForEach-Object {
            Get-ChildItem -Path $_.FullName -Include "*.dll","*.exe" -Recurse -ErrorAction SilentlyContinue
          } |
          ForEach-Object { $found[$_.Name] = $_ }

        $missing = @()
        foreach ($name in $required) {
          if ($found.ContainsKey($name)) {
            $f = $found[$name]
            $sizeKB = [math]::Round($f.Length / 1KB, 1)
            Write-Host "  ✅ $name ($sizeKB KB)"
          } else {
            Write-Host "  ❌ $name MISSING"
            $missing += $name
          }
        }

        Write-Host ""
        Write-Host "总计: $($found.Count) 个产物, $($missing.Count) 个缺失"
        if ($missing.Count -gt 0) {
          Write-Error "Build validation failed: missing $($missing -join ', ')"
          exit 1
        }

    - name: Collect DLL artifacts
      shell: pwsh
      run: |
        $outDir = "artifacts"
        New-Item -ItemType Directory -Path $outDir -Force | Out-Null

        # 直接搜索 .x64 编译输出目录，避免递归进入 Dependencies junction
        $buildRoot = "deps/Projects/windows"
        Get-ChildItem -Path $buildRoot -Directory -Filter ".x64" -Recurse -ErrorAction SilentlyContinue |
          ForEach-Object {
            Get-ChildItem -Path $_.FullName -Include "*.dll","*.exe" -Recurse -ErrorAction SilentlyContinue
          } |
          ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1)) KB)"
            Copy-Item $_.FullName -Destination $outDir -Force
          }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-dlls-${{ matrix.platform }}-${{ matrix.configuration }}
        path: artifacts/
        if-no-files-found: error
        retention-days: 30
